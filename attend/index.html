<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoviNet Attendance</title>
  <link rel="icon" href="/G.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0fdf4;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 16px 48px;
    }

    .wrap { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 16px; }

    /* ── State cards ── */
    .state-card {
      background: #fff; border-radius: 20px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      text-align: center; padding: 48px 24px;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #dcfce7;
      border-top-color: #16a34a; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-icon { font-size: 40px; margin-bottom: 12px; }
    .state-title { font-size: 17px; font-weight: 700; color: #111827; }
    .state-sub   { font-size: 13px; color: #6b7280; margin-top: 8px; line-height: 1.6; }

    /* ── Event card ── */
    .event-card {
      background: #fff; border-radius: 20px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .event-header { background: #111827; padding: 24px; }
    .event-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .event-logo img { height: 28px; }
    .event-badge {
      font-size: 11px; font-weight: 700; color: #16a34a;
      background: rgba(22,163,74,0.15); border: 1px solid rgba(22,163,74,0.3);
      border-radius: 20px; padding: 3px 10px; letter-spacing: 0.5px;
    }
    .event-title { font-size: 20px; font-weight: 800; color: #fff; line-height: 1.3; }
    .event-desc  { font-size: 13px; color: #9ca3af; margin-top: 8px; line-height: 1.6; }
    .event-body  { padding: 24px; }

    /* ── Identity section ── */
    .identity-section { margin-bottom: 20px; }
    .section-label {
      font-size: 11px; font-weight: 700; color: #374151;
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }

    /* Scan button */
    .scan-btn {
      width: 100%; padding: 14px 18px;
      border: 2px dashed #bbf7d0; border-radius: 14px;
      background: #f0fdf4; cursor: pointer;
      display: flex; align-items: center; gap: 14px;
      transition: all 0.15s; text-align: left;
    }
    .scan-btn:hover { border-color: #16a34a; background: #dcfce7; }
    .scan-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: #16a34a; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .scan-btn-title { font-size: 14px; font-weight: 700; color: #15803d; }
    .scan-btn-sub   { font-size: 12px; color: #6b7280; margin-top: 2px; }

    /* Confirmed identity card */
    .identity-confirmed {
      display: none; align-items: center; gap: 12px;
      background: #f0fdf4; border: 1.5px solid #86efac;
      border-radius: 14px; padding: 14px 16px;
    }
    .identity-confirmed.show { display: flex; }
    .id-avatar {
      width: 44px; height: 44px; border-radius: 12px;
      background: #16a34a; color: #fff; font-weight: 800; font-size: 18px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .id-name  { font-size: 14px; font-weight: 700; color: #111827; }
    .id-phone { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .id-badge {
      margin-left: auto; font-size: 11px; font-weight: 700;
      color: #15803d; background: #dcfce7; border: 1px solid #86efac;
      border-radius: 20px; padding: 3px 10px; white-space: nowrap; flex-shrink: 0;
    }
    .rescan-link {
      display: block; font-size: 12px; color: #9ca3af; text-align: center;
      margin-top: 8px; cursor: pointer; text-decoration: underline;
    }
    .rescan-link:hover { color: #16a34a; }

    /* Or divider */
    .or-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 12px 0; font-size: 12px; color: #9ca3af;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: #e5e7eb;
    }

    /* ── Form fields ── */
    .field-group { display: flex; flex-direction: column; gap: 14px; }
    .field-label {
      font-size: 11px; font-weight: 700; color: #374151;
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 6px; display: flex; align-items: center; gap: 4px;
    }
    .field-label .req { color: #ef4444; }
    .field-input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e5e7eb; border-radius: 12px;
      font-size: 14px; color: #111827;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
      background: #fff;
    }
    .field-input:focus { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.12); }
    .field-input:read-only { background: #f9fafb; color: #6b7280; cursor: default; }
    .field-input.error { border-color: #ef4444; }
    .field-error { font-size: 12px; color: #ef4444; margin-top: 4px; }

    /* Hidden fields wrapper */
    .manual-fields { transition: all 0.2s; }
    .manual-fields.hidden { display: none; }

    /* Questions divider */
    .questions-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0 4px; font-size: 11px; font-weight: 700;
      color: #9ca3af; text-transform: uppercase; letter-spacing: 0.6px;
    }
    .questions-divider::before, .questions-divider::after {
      content: ''; flex: 1; height: 1px; background: #f3f4f6;
    }

    /* Yes/No */
    .yesno-group { display: flex; gap: 10px; }
    .yesno-btn {
      flex: 1; padding: 10px; border: 1.5px solid #e5e7eb;
      border-radius: 12px; font-size: 14px; font-weight: 600;
      color: #6b7280; background: #fff; cursor: pointer;
      transition: all 0.15s; text-align: center;
    }
    .yesno-btn.selected-yes { background: #dcfce7; border-color: #16a34a; color: #15803d; }
    .yesno-btn.selected-no  { background: #fee2e2; border-color: #ef4444; color: #dc2626; }

    /* Choice */
    .choice-group { display: flex; flex-direction: column; gap: 8px; }
    .choice-opt {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border: 1.5px solid #e5e7eb;
      border-radius: 12px; cursor: pointer; transition: all 0.15s;
      font-size: 14px; color: #374151;
    }
    .choice-opt:hover { border-color: #bbf7d0; background: #f0fdf4; }
    .choice-opt.selected { border-color: #16a34a; background: #dcfce7; color: #15803d; font-weight: 600; }
    .choice-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid #d1d5db; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: all 0.15s;
    }
    .choice-opt.selected .choice-dot { border-color: #16a34a; background: #16a34a; }
    .choice-dot::after {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: #fff; display: none;
    }
    .choice-opt.selected .choice-dot::after { display: block; }

    /* Submit */
    .submit-btn {
      width: 100%; padding: 14px;
      background: #16a34a; color: #fff;
      border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 24px;
    }
    .submit-btn:hover { background: #15803d; }
    .submit-btn:disabled { background: #86efac; cursor: not-allowed; }

    /* Footer */
    .footer {
      text-align: center; font-size: 12px; color: #9ca3af;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .footer img { height: 18px; opacity: 0.6; }

    /* ── QR Scanner Modal ── */
    .scanner-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.92); flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    .scanner-overlay.open { display: flex; }
    .scanner-header {
      color: #fff; font-size: 16px; font-weight: 700;
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }
    .scanner-box {
      width: 100%; max-width: 320px; border-radius: 16px; overflow: hidden;
      position: relative;
    }
    #qr-reader { width: 100%; }
    #qr-reader video { border-radius: 12px; }
    /* Corner markers */
    .scanner-corners {
      position: absolute; inset: 0; pointer-events: none;
    }
    .corner {
      position: absolute; width: 24px; height: 24px;
      border-color: #16a34a; border-style: solid; border-width: 0;
    }
    .corner-tl { top: 12px; left: 12px; border-top-width: 3px; border-left-width: 3px; border-radius: 4px 0 0 0; }
    .corner-tr { top: 12px; right: 12px; border-top-width: 3px; border-right-width: 3px; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: 12px; left: 12px; border-bottom-width: 3px; border-left-width: 3px; border-radius: 0 0 0 4px; }
    .corner-br { bottom: 12px; right: 12px; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 4px 0; }

    .scanner-hint {
      color: #9ca3af; font-size: 13px; text-align: center; margin-top: 20px; line-height: 1.6;
    }
    .scanner-hint strong { color: #fff; }
    .scanner-close {
      margin-top: 24px; padding: 12px 32px;
      background: #374151; color: #fff; border: none;
      border-radius: 12px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .scanner-close:hover { background: #4b5563; }
    .scan-error {
      color: #fca5a5; font-size: 13px; text-align: center;
      margin-top: 12px; display: none;
    }
  </style>
</head>
<body>

<!-- QR Scanner Overlay -->
<div class="scanner-overlay" id="scanner-overlay">
  <div class="scanner-header">
    <i class="fa-solid fa-qrcode"></i> Scan Your GoviNet QR
  </div>
  <div class="scanner-box">
    <div id="qr-reader"></div>
    <div class="scanner-corners">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
    </div>
  </div>
  <p class="scanner-hint">Point your camera at the <strong>GoviNet QR code</strong><br/>in your GoviNet app → My QR</p>
  <p class="scan-error" id="scan-error"><i class="fa-solid fa-circle-exclamation"></i> <span id="scan-error-msg"></span></p>
  <button class="scanner-close" id="btn-close-scanner">Cancel</button>
</div>

<div class="wrap" id="root">
  <div class="state-card">
    <div class="spinner"></div>
    <div class="state-title">Loading event…</div>
  </div>
</div>

<script>
const API = "https://govinetwebapi-etb4dygbafa7bvbs.canadacentral-01.azurewebsites.net";

let sheet = null;
const answers = {};
let html5QrCode = null;
let identifiedUser = null; // { userName, phoneNumber }

function getSheetId() {
  const parts = window.location.pathname.split("/").filter(Boolean);
  const idx = parts.indexOf("attend");
  if (idx !== -1 && parts[idx + 1]) return parseInt(parts[idx + 1], 10);
  return parseInt(new URLSearchParams(window.location.search).get("id") || "0", 10);
}

function esc(str) {
  if (!str) return "";
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function parseOptions(raw) {
  try { return JSON.parse(raw || "[]"); } catch { return []; }
}

function initials(name) {
  return (name || "?").split(" ").map(w => w[0]).join("").toUpperCase().slice(0,2);
}

// ── Load sheet ───────────────────────────────────────────────────────────────

async function load() {
  const root = document.getElementById("root");
  const sheetId = getSheetId();

  if (!sheetId) {
    root.innerHTML = `<div class="state-card">
      <div class="state-icon" style="color:#d1d5db"><i class="fa-solid fa-clipboard-list"></i></div>
      <div class="state-title">No sheet found</div>
      <div class="state-sub">This link doesn't point to a valid attendance sheet.</div>
    </div>`;
    return;
  }

  try {
    const res = await fetch(`${API}/api/AttendanceSheets/${sheetId}`);
    if (!res.ok) throw new Error();
    sheet = await res.json();
    document.title = `${sheet.title} · GoviNet Attendance`;

    if (!sheet.isActive) {
      root.innerHTML = `<div class="state-card">
        <div class="state-icon" style="color:#f59e0b"><i class="fa-solid fa-lock"></i></div>
        <div class="state-title">Sheet Closed</div>
        <div class="state-sub">This attendance sheet is no longer active.</div>
      </div>`;
      return;
    }

    root.innerHTML = buildForm(sheet);
    attachEvents();
  } catch {
    root.innerHTML = `<div class="state-card">
      <div class="state-icon" style="color:#d1d5db"><i class="fa-solid fa-circle-exclamation"></i></div>
      <div class="state-title">Could not load</div>
      <div class="state-sub">Unable to load this attendance sheet. Please try again.</div>
    </div>`;
  }
}

// ── Build form ───────────────────────────────────────────────────────────────

function buildForm(s) {
  const qHtml = s.questions.length === 0 ? "" : `
    <div class="questions-divider"><i class="fa-solid fa-list-check"></i> Questions</div>
    <div class="field-group" id="questions-wrap">
      ${s.questions.map(q => buildQuestion(q)).join("")}
    </div>`;

  const proofDocHtml = s.requiresProofDoc ? `
    <div class="questions-divider"><i class="fa-solid fa-file-shield"></i> Proof Document</div>
    <div>
      <div class="field-label">
        <i class="fa-solid fa-id-card"></i> Upload Document <span class="req">*</span>
      </div>
      <p style="font-size:12px;color:#6b7280;margin-bottom:10px;line-height:1.5">
        Upload a photo of your NIC, farmer registration card, or any relevant document.
      </p>
      <label id="doc-upload-label" style="
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        gap:10px; padding:24px 16px; border:2px dashed #e5e7eb; border-radius:14px;
        background:#f9fafb; cursor:pointer; transition:all 0.15s; text-align:center;">
        <div style="width:48px;height:48px;border-radius:12px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:22px;color:#9ca3af">
          <i class="fa-solid fa-cloud-arrow-up"></i>
        </div>
        <div>
          <div style="font-size:14px;font-weight:700;color:#374151">Tap to upload</div>
          <div style="font-size:12px;color:#9ca3af;margin-top:2px">JPG, PNG or PDF · max 5 MB</div>
        </div>
        <input id="f-doc" type="file" accept="image/*,application/pdf" style="display:none" onchange="handleDocUpload(this)" />
      </label>
      <!-- Preview -->
      <div id="doc-preview" style="display:none; margin-top:12px; border:1px solid #e5e7eb; border-radius:12px; overflow:hidden; position:relative;">
        <img id="doc-preview-img" style="width:100%;max-height:200px;object-fit:cover;display:none" />
        <div id="doc-preview-file" style="display:none; padding:12px 16px; display:flex; align-items:center; gap:10px;">
          <i class="fa-solid fa-file-pdf" style="color:#ef4444;font-size:20px"></i>
          <span id="doc-preview-name" style="font-size:13px;font-weight:600;color:#374151"></span>
        </div>
        <button onclick="clearDoc()" style="
          position:absolute; top:8px; right:8px; width:28px; height:28px;
          border-radius:50%; background:rgba(0,0,0,0.5); color:#fff; border:none;
          cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px;">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="field-error" id="err-doc"></div>
    </div>` : "";

  return `
    <div class="event-card">
      <div class="event-header">
        <div class="event-logo">
          <img src="/Logo.png" alt="GoviNet" />
          <span class="event-badge">ATTENDANCE</span>
        </div>
        <div class="event-title">${esc(s.title)}</div>
        ${s.description ? `<div class="event-desc">${esc(s.description)}</div>` : ""}
      </div>
      <div class="event-body">

        <!-- Identity section -->
        <div class="identity-section">
          <div class="section-label">
            <i class="fa-solid fa-user-check" style="color:#16a34a"></i> Identify Yourself
          </div>

          <!-- Scan button (shown when not yet identified) -->
          <div id="scan-btn-wrap">
            <button class="scan-btn" id="btn-open-scanner">
              <div class="scan-icon"><i class="fa-solid fa-qrcode"></i></div>
              <div>
                <div class="scan-btn-title">Scan My GoviNet QR</div>
                <div class="scan-btn-sub">Auto-fill your name &amp; phone from the app</div>
              </div>
            </button>

            <div class="or-divider">or enter manually</div>

            <div class="field-group">
              <div>
                <div class="field-label"><i class="fa-solid fa-user"></i> Full Name <span class="req">*</span></div>
                <input id="f-name" class="field-input" type="text" placeholder="Your full name" autocomplete="name" />
                <div class="field-error" id="err-name"></div>
              </div>
              <div>
                <div class="field-label"><i class="fa-solid fa-phone"></i> Phone Number <span class="req">*</span></div>
                <input id="f-phone" class="field-input" type="tel" placeholder="07X XXX XXXX" autocomplete="tel" />
                <div class="field-error" id="err-phone"></div>
              </div>
            </div>
          </div>

          <!-- Confirmed identity card (shown after QR scan) -->
          <div class="identity-confirmed" id="identity-confirmed">
            <div class="id-avatar" id="id-avatar">?</div>
            <div>
              <div class="id-name" id="id-name">—</div>
              <div class="id-phone" id="id-phone">—</div>
            </div>
            <span class="id-badge"><i class="fa-solid fa-circle-check"></i> Verified</span>
          </div>
          <span class="rescan-link" id="rescan-link" style="display:none" onclick="resetIdentity()">
            <i class="fa-solid fa-rotate"></i> Use a different account
          </span>
        </div>

        ${qHtml}

        ${proofDocHtml}

        <div class="field-error" style="text-align:center;margin-top:12px" id="err-submit"></div>

        <button class="submit-btn" id="btn-submit">
          <i class="fa-solid fa-check-circle"></i> Mark Attendance
        </button>
      </div>
    </div>

    <div class="footer">
      <img src="/Logo.png" alt="GoviNet" /> Powered by GoviNet
    </div>`;
}

function buildQuestion(q) {
  if (q.questionType === "yesno") {
    return `<div>
      <div class="field-label">${esc(q.questionText)} ${q.isRequired ? '<span class="req">*</span>' : ""}</div>
      <div class="yesno-group">
        <button type="button" class="yesno-btn" data-qid="${q.id}" data-val="Yes" onclick="selectYesNo(${q.id},'Yes')">
          <i class="fa-solid fa-check" style="margin-right:5px;color:#16a34a"></i> Yes
        </button>
        <button type="button" class="yesno-btn" data-qid="${q.id}" data-val="No" onclick="selectYesNo(${q.id},'No')">
          <i class="fa-solid fa-xmark" style="margin-right:5px;color:#ef4444"></i> No
        </button>
      </div>
      <div class="field-error" id="err-q${q.id}"></div>
    </div>`;
  }

  if (q.questionType === "choice") {
    const opts = parseOptions(q.options);
    return `<div>
      <div class="field-label">${esc(q.questionText)} ${q.isRequired ? '<span class="req">*</span>' : ""}</div>
      <div class="choice-group">
        ${opts.map(opt => `
          <div class="choice-opt" data-qid="${q.id}" data-val="${esc(opt)}" onclick="selectChoice(${q.id},'${esc(opt)}',this)">
            <div class="choice-dot"></div>${esc(opt)}
          </div>`).join("")}
      </div>
      <div class="field-error" id="err-q${q.id}"></div>
    </div>`;
  }

  return `<div>
    <div class="field-label">${esc(q.questionText)} ${q.isRequired ? '<span class="req">*</span>' : ""}</div>
    <input class="field-input" type="text" id="q-${q.id}" placeholder="Your answer…" />
    <div class="field-error" id="err-q${q.id}"></div>
  </div>`;
}

// ── QR Scanner ───────────────────────────────────────────────────────────────

function openScanner() {
  document.getElementById("scanner-overlay").classList.add("open");
  document.getElementById("scan-error").style.display = "none";

  html5QrCode = new Html5Qrcode("qr-reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 240, height: 240 }, aspectRatio: 1 },
    onQrSuccess,
    () => {}   // suppress per-frame errors
  ).catch(err => {
    showScanError("Camera access denied. Please allow camera permission and try again.");
  });
}

function closeScanner() {
  document.getElementById("scanner-overlay").classList.remove("open");
  if (html5QrCode) {
    html5QrCode.stop().catch(() => {});
    html5QrCode = null;
  }
  // Clean up the reader element so it can be re-used
  const el = document.getElementById("qr-reader");
  if (el) el.innerHTML = "";
}

function showScanError(msg) {
  document.getElementById("scan-error-msg").textContent = msg;
  document.getElementById("scan-error").style.display = "block";
}

async function onQrSuccess(text) {
  // Stop scanner immediately
  if (html5QrCode) {
    await html5QrCode.stop().catch(() => {});
    html5QrCode = null;
  }
  document.getElementById("scanner-overlay").classList.remove("open");
  document.getElementById("qr-reader").innerHTML = "";

  // Match govinet.lk/u/{token}
  const match = text.match(/(?:www\.)?govinet\.lk\/u\/([A-Za-z0-9_-]+)/);
  if (!match) {
    showScanError("This is not a GoviNet profile QR. Please scan the QR from your GoviNet app.");
    document.getElementById("scanner-overlay").classList.add("open");
    return;
  }

  const token = match[1];

  // Show loading in scan button
  document.getElementById("btn-open-scanner").innerHTML = `
    <div class="scan-icon"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
    <div><div class="scan-btn-title">Loading profile…</div></div>`;

  try {
    const res = await fetch(`${API}/api/GoviNetUsers/by-token/${encodeURIComponent(token)}`);
    if (!res.ok) throw new Error();
    const user = await res.json();
    setIdentifiedUser(user.userName, user.phoneNumber);
  } catch {
    // Restore button
    document.getElementById("btn-open-scanner").innerHTML = `
      <div class="scan-icon"><i class="fa-solid fa-qrcode"></i></div>
      <div>
        <div class="scan-btn-title">Scan My GoviNet QR</div>
        <div class="scan-btn-sub">Auto-fill your name &amp; phone from the app</div>
      </div>`;
    alert("Could not load your profile. Please try again or enter details manually.");
  }
}

function setIdentifiedUser(name, phone) {
  identifiedUser = { name, phone };

  // Hide scan button + manual fields
  document.getElementById("scan-btn-wrap").style.display = "none";

  // Show confirmed card
  document.getElementById("id-avatar").textContent = initials(name);
  document.getElementById("id-name").textContent = name;
  document.getElementById("id-phone").textContent = phone;
  document.getElementById("identity-confirmed").classList.add("show");
  document.getElementById("rescan-link").style.display = "block";
}

function resetIdentity() {
  identifiedUser = null;
  document.getElementById("scan-btn-wrap").style.display = "block";
  document.getElementById("identity-confirmed").classList.remove("show");
  document.getElementById("rescan-link").style.display = "none";
  document.getElementById("f-name").value = "";
  document.getElementById("f-phone").value = "";
}

// ── Question interactions ────────────────────────────────────────────────────

function selectYesNo(qid, val) {
  answers[qid] = val;
  document.querySelectorAll(`.yesno-btn[data-qid="${qid}"]`).forEach(btn => {
    btn.className = "yesno-btn" + (btn.dataset.val === val ? (val === "Yes" ? " selected-yes" : " selected-no") : "");
  });
  const err = document.getElementById(`err-q${qid}`);
  if (err) err.textContent = "";
}

function selectChoice(qid, val, el) {
  answers[qid] = val;
  document.querySelectorAll(`.choice-opt[data-qid="${qid}"]`).forEach(opt => {
    opt.classList.toggle("selected", opt.dataset.val === val);
  });
  const err = document.getElementById(`err-q${qid}`);
  if (err) err.textContent = "";
}

// ── Proof document upload ────────────────────────────────────────────────────

let proofDocBase64 = null;

function handleDocUpload(input) {
  const file = input.files[0];
  if (!file) return;

  if (file.size > 5 * 1024 * 1024) {
    document.getElementById("err-doc").textContent = "File is too large. Maximum size is 5 MB.";
    input.value = "";
    return;
  }

  document.getElementById("err-doc").textContent = "";

  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target.result;

    if (file.type.startsWith("image/")) {
      // Compress image via canvas
      const img = new Image();
      img.onload = function() {
        const MAX = 1200;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        proofDocBase64 = canvas.toDataURL("image/jpeg", 0.82);
        showDocPreview(file, proofDocBase64, "image");
      };
      img.src = dataUrl;
    } else {
      // PDF — store as-is
      proofDocBase64 = dataUrl;
      showDocPreview(file, dataUrl, "pdf");
    }
  };
  reader.readAsDataURL(file);
}

function showDocPreview(file, dataUrl, type) {
  const preview = document.getElementById("doc-preview");
  preview.style.display = "block";
  document.getElementById("doc-upload-label").style.display = "none";

  if (type === "image") {
    const img = document.getElementById("doc-preview-img");
    img.src = dataUrl;
    img.style.display = "block";
    document.getElementById("doc-preview-file").style.display = "none";
  } else {
    document.getElementById("doc-preview-img").style.display = "none";
    const fileDiv = document.getElementById("doc-preview-file");
    fileDiv.style.display = "flex";
    document.getElementById("doc-preview-name").textContent = file.name;
  }
}

function clearDoc() {
  proofDocBase64 = null;
  document.getElementById("f-doc").value = "";
  document.getElementById("doc-preview").style.display = "none";
  document.getElementById("doc-upload-label").style.display = "flex";
}

// ── Attach events ────────────────────────────────────────────────────────────

function attachEvents() {
  document.getElementById("btn-open-scanner").addEventListener("click", openScanner);
  document.getElementById("btn-close-scanner").addEventListener("click", closeScanner);
  document.getElementById("btn-submit").addEventListener("click", handleSubmit);

  if (sheet) {
    sheet.questions.forEach(q => {
      if (q.questionType === "text") {
        const el = document.getElementById(`q-${q.id}`);
        if (el) el.addEventListener("input", () => { answers[q.id] = el.value; });
      }
    });
  }
}

// ── Submit ───────────────────────────────────────────────────────────────────

async function handleSubmit() {
  // Clear errors
  ["err-name","err-phone","err-submit"].forEach(id => {
    const el = document.getElementById(id); if (el) el.textContent = "";
  });
  if (sheet) sheet.questions.forEach(q => {
    const el = document.getElementById(`err-q${q.id}`); if (el) el.textContent = "";
  });

  // Determine name + phone
  let name, phone;
  if (identifiedUser) {
    name  = identifiedUser.name;
    phone = identifiedUser.phone;
  } else {
    name  = (document.getElementById("f-name")?.value || "").trim();
    phone = (document.getElementById("f-phone")?.value || "").trim();
  }

  let valid = true;
  if (!name) {
    const el = document.getElementById("err-name");
    if (el) el.textContent = "Full name is required.";
    document.getElementById("f-name")?.classList.add("error");
    valid = false;
  }
  if (!phone) {
    const el = document.getElementById("err-phone");
    if (el) el.textContent = "Phone number is required.";
    document.getElementById("f-phone")?.classList.add("error");
    valid = false;
  }

  if (sheet) {
    sheet.questions.forEach(q => {
      if (q.isRequired && !answers[q.id]) {
        const el = document.getElementById(`err-q${q.id}`);
        if (el) el.textContent = "This field is required.";
        valid = false;
      }
    });
  }

  // Validate proof doc if required
  if (sheet && sheet.requiresProofDoc && !proofDocBase64) {
    const el = document.getElementById("err-doc");
    if (el) el.textContent = "Please upload a proof document.";
    valid = false;
  }

  if (!valid) return;

  const btn = document.getElementById("btn-submit");
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Submitting…';

  const answersList = sheet
    ? sheet.questions.map(q => ({ questionId: q.id, answer: answers[q.id] || "" }))
    : [];

  try {
    const res = await fetch(`${API}/api/AttendanceSheets/${sheet.id}/attend`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fullName: name, phoneNumber: phone, answers: answersList, proofDocBase64 }),
    });
    const body = await res.json();

    if (res.status === 409) {
      document.getElementById("root").innerHTML = `
        <div class="state-card">
          <div class="state-icon" style="color:#f59e0b"><i class="fa-solid fa-triangle-exclamation"></i></div>
          <div class="state-title">Already Attended</div>
          <div class="state-sub">${esc(body.message)}</div>
        </div>
        <div class="footer"><img src="/Logo.png" alt="GoviNet" /> Powered by GoviNet</div>`;
      return;
    }
    if (!res.ok) throw new Error(body.message || "Failed");

    document.getElementById("root").innerHTML = `
      <div class="state-card">
        <div class="state-icon" style="color:#16a34a"><i class="fa-solid fa-circle-check"></i></div>
        <div class="state-title">Attendance Recorded!</div>
        <div class="state-sub">
          Thank you, <strong>${esc(name)}</strong>.<br/>
          Your attendance for <strong>${esc(sheet.title)}</strong> has been saved.
        </div>
        <button onclick="nextAttend()" style="
          margin-top:20px; padding:12px 28px;
          background:#16a34a; color:#fff; border:none; border-radius:12px;
          font-size:14px; font-weight:700; cursor:pointer; display:inline-flex;
          align-items:center; gap:8px; transition:background 0.15s;">
          <i class="fa-solid fa-user-plus"></i> Next Person
        </button>
      </div>
      <div class="footer"><img src="/Logo.png" alt="GoviNet" /> Powered by GoviNet</div>`;
  } catch {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Mark Attendance';
    document.getElementById("err-submit").textContent = "Submission failed. Please check your connection and try again.";
  }
}

function nextAttend() {
  // Clear all answer state
  Object.keys(answers).forEach(k => delete answers[k]);
  identifiedUser = null;
  proofDocBase64 = null;

  // Re-render the form fresh
  document.getElementById("root").innerHTML = buildForm(sheet);
  attachEvents();
}

load();
</script>
